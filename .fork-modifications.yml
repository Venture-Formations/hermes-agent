# Source-of-truth metadata for the hermes-agent fork's modifications over upstream
# (NousResearch/hermes-agent). Read by hermes-workspace/tools/gen-modifications.ts.
#
# Keyed by STABLE logical id, NOT commit SHA — each gbrain/hermes upgrade
# cherry-picks these onto a new tag, minting new hashes. `last_applied_sha` is a
# mutable record of the most recent cherry-pick; it is never the key.
#
# --check verifies, for each entry, that every file in `files` exists and the
# `marker` string is present in it (the change survived the last cherry-pick).
upstream: NousResearch/hermes-agent
based_on_tag: "v2026.6.5"
deployed_branch: "fix/parallel-tool-calls-v2026.6.5"   # v0.16.0

modifications:
  - id: parallel-tool-calls-transport
    title: "Enable parallel_tool_calls on the chat_completions transport"
    category: hermes-fork
    risk: red
    files:
      - agent/transports/chat_completions.py
      - providers/base.py
    marker: "parallel_tool_calls"
    why: >
      The chat_completions transport never sent parallel_tool_calls, so providers
      defaulted to one tool dispatch per response (~84% of completions ended in
      tool_calls, median 5+ model calls per task). The Codex transport already set
      it; this brings chat_completions to parity. providers/base.py adds a
      ProviderProfile.supports_parallel_tool_calls flag for per-provider opt-out.
    reapply: cherry-pick      # onto each new upstream tag
    deprecate_when: "upstream merges parallel_tool_calls into the chat_completions transport"
    added: "2026-05-28"
    last_applied_sha: "3da3aa9a8cee85d8e33423f231a475ae29697ae4"

  - id: parallel-tool-guidance-prompt
    title: "Nudge non-Gemini batchable models to parallel-dispatch tools"
    category: hermes-fork
    risk: red
    files:
      - agent/prompt_builder.py
      - agent/system_prompt.py
    marker: "PARALLEL_TOOL_GUIDANCE"
    why: >
      The API permits batched dispatch but the model chooses how many to emit.
      PARALLEL_TOOL_GUIDANCE + PARALLEL_TOOL_MODELS (deepseek, qwen, glm) inject
      guidance for non-Gemini batch-friendly models, adjacent to the existing
      GOOGLE_MODEL_OPERATIONAL_GUIDANCE. Mirrors the codex transport precedent.
    reapply: cherry-pick
    deprecate_when: "upstream ships equivalent parallel-dispatch model guidance for non-Gemini models"
    added: "2026-05-28"
    last_applied_sha: "569ac6977153ffa1012c7609771cbb951a270302"

  - id: oauth-fail-closed
    title: "Fail-closed OAuth routing — refuse the silent OpenRouter fallback + alert"
    category: hermes-fork
    risk: red
    files:
      - hermes_cli/runtime_provider.py
    marker: "VF-FAIL-CLOSED-1"
    why: >
      resolve_runtime_provider()'s terminal OpenRouter fallback would, on an
      xAI-OAuth outage under provider=auto, SILENTLY bill OPENROUTER_API_KEY
      instead of failing. This deployment routes all chat through the operator's
      xAI OAuth / SuperGrok subscription, so that silent failover is unwanted.
      With HERMES_OAUTH_FAIL_CLOSED enabled, reaching the terminal OpenRouter
      fallback under `auto` raises AuthError (chat fails loudly) and fires a
      throttled notify.sh alert (Slack-if-configured + brain inbox). An explicit
      provider request (requested_provider != "auto") is unaffected. Safe-by-default:
      env var unset = no-op. Gated by the HERMES_OAUTH_FAIL_CLOSED Railway var.
    reapply: cherry-pick      # onto each new upstream tag, with the other fork commits
    deprecate_when: "the operator stops routing all chat through a single OAuth subscription (re-enables OpenRouter as an intended provider), OR upstream adds a native fail-closed / no-fallback provider knob."
    added: "2026-06-14"
    last_applied_sha: "c65f61360c20bf9c0f3dc1a978d7d194ae125215"
